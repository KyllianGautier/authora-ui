<ul class="password-rules" *transloco="let t">
  @for (result of results(); track result.key) {
    <li [class.passed]="result.passed" [class.failed]="!result.passed">
      <mat-icon class="rule-icon">{{ result.passed ? 'check' : 'close' }}</mat-icon>
      <span>{{ t('passwordRules.' + result.key) }}</span>
    </li>
  }
</ul>
